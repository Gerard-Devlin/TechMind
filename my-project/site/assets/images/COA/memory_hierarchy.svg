<svg xmlns="http://www.w3.org/2000/svg" width="720" height="173" viewBox="0 0 720 173">
  <rect width="720" height="173" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <style>
    .box { fill: none; stroke: #111; stroke-width: 2; }
    .line { fill: none; stroke: #111; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; }
    .text { fill: #111; font-family: "Noto Serif CJK SC", "Times New Roman", "SimSun", serif; font-size: 22px; text-anchor: middle; dominant-baseline: middle; }
    .label { fill: #111; font-family: "Noto Serif CJK SC", "Times New Roman", "SimSun", serif; font-size: 22px; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <!-- Boxes -->
  <rect class="box" x="28" y="55" width="110" height="46"/>
  <rect class="box" x="200" y="55" width="110" height="46"/>
  <rect class="box" x="375" y="55" width="110" height="46"/>
  <rect class="box" x="550" y="55" width="110" height="46"/>

  <!-- Box labels -->
  <text class="text" x="83" y="78">CPU</text>
  <text class="text" x="255" y="78">Cache</text>
  <text class="text" x="430" y="78">主存</text>
  <text class="text" x="605" y="78">辅存</text>

  <!-- CPU <-> Cache -->
  <line class="line" x1="138" y1="72" x2="199" y2="72" marker-end="url(#arrow)"/>
  <line class="line" x1="200" y1="88" x2="139" y2="88" marker-end="url(#arrow)"/>

  <!-- Cache <-> Main memory -->
  <line class="line" x1="375" y1="72" x2="311" y2="72" marker-end="url(#arrow)"/>
  <line class="line" x1="310" y1="88" x2="374" y2="88" marker-end="url(#arrow)"/>

  <!-- Main memory <-> Auxiliary memory -->
  <line class="line" x1="486" y1="72" x2="549" y2="72" marker-end="url(#arrow)"/>
  <line class="line" x1="550" y1="88" x2="486" y2="88" marker-end="url(#arrow)"/>

  <!-- Upper bypass path: 主存 -> CPU -->
  <path class="line" d="M430 55 L430 22 L83 22 L83 54" marker-end="url(#arrow)"/>

  <!-- Lower bypass path: CPU -> 主存 -->
  <path class="line" d="M83 101 L83 137 L430 137 L430 102" marker-end="url(#arrow)"/>

  <!-- Layer labels -->
  <text class="label" x="342" y="122">Cache — 主存层</text>
  <text class="label" x="545" y="122">主存—辅存层</text>
</svg>
